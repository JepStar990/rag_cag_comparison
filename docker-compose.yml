services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports: ["6333:6333"]
    volumes:
      - qdrant-data:/qdrant/storage

  redis:
    image: redis/redis-stack:latest
    container_name: redis
    ports: ["6379:6379"]
    environment:
      - REDIS_ARGS=--save 60 1000 --appendonly yes
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio-data:/data

  tika:
    image: apache/tika:latest
    container_name: tika
    ports: ["9998:9998"]

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    container_name: embeddings
    ports: ["8080:80"]
    environment:
      MODEL_ID: BAAI/bge-m3
      MAX_CLIENTS: 16
      EMBEDDING_DIM: 1024

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ports: ["8000:8000"]
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    command: >
      --model meta-llama/Llama-3.1-8B-Instruct
      --download-dir /models
      --port 8000
      --trust-remote-code
      --enable-prefix-caching

    volumes:
      - vllm-models:/models

  asr:
    build:
      context: ./services/asr
      dockerfile: Dockerfile
    container_name: asr
    ports: ["7001:7001"]

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: api
    depends_on: [qdrant, redis, minio, embeddings, vllm, tika, asr]
    ports: ["8081:8081"]
    env_file:
      - ./configs/.env
    environment:
      VECTOR_DB_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      EMB_URL: http://embeddings:80
      LLM_URL: http://vllm:8000
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ai-data
      TIKA_URL: http://tika:9998
      ASR_URL: http://asr:7001
      INDEX_COLLECTION: ai_chunks
      INDEX_VERSION: "1"
      CACHE_SIM_THRESHOLD: "0.92"
    volumes:
      - ../data:/app/data

volumes:
  qdrant-data:
  redis-data:
  minio-data:
  vllm-models:
