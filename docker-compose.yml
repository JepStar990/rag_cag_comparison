services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports: ["6333:6333"]
    volumes:
      - qdrant-data:/qdrant/storage

  redis:
    image: redis/redis-stack:latest
    container_name: redis
    ports: ["6379:6379"]
    environment:
      - REDIS_ARGS=--save 60 1000 --appendonly yes
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio-data:/data

  tika:
    image: apache/tika:latest
    container_name: tika
    ports: ["9998:9998"]

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    ports: ["8080:80"]
    command: --model-id BAAI/bge-m3 --device cpu

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 30

  # Cross-encoder reranker (CPU)
  reranker:
    build:
      context: ./services/reranker
    container_name: reranker
    environment:
      RERANKER_MODEL_ID: BAAI/bge-reranker-v2-m3
    ports: ["7002:7002"]

  # ASR (faster-whisper on CPU)
  asr:
    build:
      context: ./services/asr
    container_name: asr
    ports: ["7001:7001"]

  # FastAPI orchestrator
  api:
    build:
      context: ./services/api
    container_name: api
    depends_on:
      - qdrant
      - redis
      - minio
      - tika
      - asr
      - reranker
      - ollama
    ports: ["8081:8081"]
    env_file:
      - ./configs/.env
    environment:
      VECTOR_DB_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      LLM_URL: http://ollama:11434
      LLM_MODEL: llama3.2:3b-instruct
      EMB_PROVIDER: ollama
      OLLAMA_EMB_MODEL: nomic-embed-text
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ai-data
      TIKA_URL: http://tika:9998
      ASR_URL: http://asr:7001
      RERANKER_URL: http://reranker:7002
      INDEX_COLLECTION: ai_chunks
      INDEX_VERSION: "1"
      CACHE_SIM_THRESHOLD: "0.92"
    volumes:
      - ./data:/app/data

volumes:
  qdrant-data:
  redis-data:
  minio-data:
  ollama-data:
